<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EcoQuest | Eco Quiz</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+JP:wght@300;400;500&family=Quicksand:wght@400;600;700;800&family=Nunito:wght@400;600;700;800;900&family=Nanum+Myeongjo:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script src="quiz.js"></script>
</head>
<body>

<div class="header">
  <div>
    <div class="logo">✦ EcoQuest</div>
    <div class="logo-sub">green daily quest</div>
  </div>
  <div class="nav-tabs" id="mainNav" style="display:none;">
    <a class="nav-tab" href="home.html">🏠 Home</a>
    <a class="nav-tab" href="quiz.html">❓ Quiz</a>
    <a class="nav-tab" href="calculator.html">🌍 Calculator</a>
    <a class="nav-tab" href="report.html">📸 Report</a>
  </div>
  <div class="header-right">
    <div class="user-pill" id="userPill" style="display:none;">👤 <strong id="hName">—</strong> &nbsp;<span class="points-badge" id="hPts">0 pts</span></div>
    <button class="theme-btn" onclick="openTheme()">🎨 Theme</button>
    <button class="btn btn-ghost btn-sm" id="logoutBtn" onclick="EcoAuth.logout()" style="display:none;">✕ Logout</button>
  </div>
</div>

<div class="main fade-up">
  <div class="page-header">
    <div class="page-title">❓ Eco Quiz</div>
    <div class="page-sub">10 levels · 10 questions each · score ≥ 40% to unlock the next</div>
  </div>

  <div id="qLevelSelect">
    <div id="qLevelGrid" class="level-grid"></div>
  </div>

  <div id="qPlay" style="display:none;">
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
        <div style="font-size:8px;font-family:var(--font-head);color:var(--accent2);" id="qLevelBadge">Level 1</div>
        <button class="btn btn-ghost btn-sm" onclick="qBackToLevels()">← Levels</button>
      </div>
      <div class="progress-track"><div class="progress-fill" id="qProg" style="width:0%"></div></div>
      <div class="q-count" id="qCount">Question 1 / 10</div>
      <div id="qActive">
        <div class="question-text" id="qText">Loading…</div>
        <div class="options-grid" id="qOpts"></div>
        <button class="btn btn-ghost" id="qNext" style="display:none;" onclick="nextQ()">Next →</button>
      </div>
      <div id="qDone" class="quiz-done hidden">
        <span class="big" id="qScoreBig">0</span>
        <div class="sub" id="qScoreSub"></div>
        <div id="qStarRow" style="font-size:26px;margin:10px 0;"></div>
        <div class="btn-row" style="justify-content:center;margin-top:16px;">
          <button class="btn" onclick="replayLevel()">↺ Retry</button>
          <button class="btn btn-ghost" onclick="qBackToLevels()">← All Levels</button>
          <button class="btn" id="qNextLvlBtn" onclick="nextLevel()" style="display:none;">Next Level →</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Theme Modal -->
<div class="overlay hidden" id="themeOverlay" onclick="closeTheme(event)">
  <div class="theme-modal" onclick="event.stopPropagation()">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
      <div class="theme-modal-title">✦ Choose Your World</div>
      <button onclick="closeTheme()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:20px;">×</button>
    </div>
    <div class="theme-grid" id="themeGrid"></div>
  </div>
</div>

<script>
(async () => {
  await EcoAuth.initHeader('quiz');
  initQuiz();
})();
</script>
</body>
</html>
